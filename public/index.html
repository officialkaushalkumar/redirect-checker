</head>
<body>

<h1>Redirect Checker</h1>

<input
 id="url"
 placeholder="Enter URL"
/>

<button onclick="checkRedirect()">
    Check
</button>

<hr>

<div id="result"></div>

<script>

async function checkRedirect() {

    const url =
        document.getElementById("url").value;

    const result =
        document.getElementById("result");

    result.innerHTML = "Loading...";

    try {

        const response = await fetch(
            "/.netlify/functions/check-redirect",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    url: url
                })
            }
        );

        const data = await response.json();

        if (data.error) {

            result.innerHTML =
                "<b>Error:</b> " + data.error;

            return;
        }

        let html = "";

        data.redirects.forEach((item,index) => {

            const nextUrl =
                data.redirects[index + 1]?.url ||
                "Final Landing Page";

            html += `
                <div class="box">

                    <b>Step ${index + 1}</b>

                    <br><br>

                    <b>URL:</b><br>
                    ${item.url}

                    <br><br>

                    <b>Status:</b>
                    ${item.status}

                    <br><br>

                    <b>Redirect To:</b><br>
                    ${nextUrl}

                </div>
            `;

            if(index < data.redirects.length - 1){

                html += `
                    <div class="arrow">
                        ↓
                    </div>
                `;

            }

        });

        html += `
            <div class="box final">

                <h3>Final Landing Page</h3>

                ${data.finalUrl}

            </div>
        `;

        result.innerHTML = html;

    } catch(error) {

        result.innerHTML =
            "<b>Error:</b> " + error.message;

    }

}

</script>

</body>
</html>
